services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: python telegram_bot.py
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: python admin_web.py
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "18080:${ADMIN_WEB_PORT:-8080}"
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    profiles: ["prod"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - bot
      - admin
